<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Smoczy Radar - overlay</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  /* ============================================================
     KONFIGURACJA — RADAR_CONFIG jest w sekcji <script> na dole.
     - Radar probuje sam pobrac prawdziwa lokalizacje z GPS telefonu
       (przegladarkowe Geolocation API) i wyswietlic prawdziwa mape
       (OpenStreetMap) w srodku, w zielonym "skanerowym" stylu.
     - Jesli aplikacja (IRL PRO / Streamlabs) zablokuje dostep do GPS
       w swoim wbudowanym oknie przegladarki, mozna recznie podac
       pozycje w adresie: ?lat=50.06&lng=19.94
     - km: dystans liczy sie SAM na podstawie ruchu GPS (mozna tez
       nadpisac recznie przez ?km=12.4 albo w trybie ?edit=1)
     Data i godzina aktualizuja sie same (biora je z zegara urzadzenia).
  ============================================================ */

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: transparent !important;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .radar-unit {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 24px;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6));
  }

  /* --- Obudowa: prosta, ciemna ramka (jak w prawdziwym zabawkowym radarze) --- */
  .radar-casing {
    position: relative;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 26%, #3a3a3a 0%, #1a1a1a 55%, #0a0a0a 100%);
    box-shadow:
      inset 0 4px 8px rgba(255,255,255,0.18),
      inset 0 -10px 18px rgba(0,0,0,0.7),
      0 0 0 2px #000;
  }

  .radar-bezel {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 276px;
    height: 276px;
    border-radius: 50%;
    background: #050505;
    box-shadow:
      inset 0 0 0 2px #000,
      inset 0 2px 4px rgba(255,255,255,0.1),
      inset 0 -3px 8px rgba(0,0,0,0.9);
  }

  /* --- Ekran --- */
  .radar-screen {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 252px;
    height: 252px;
    border-radius: 50%;
    overflow: hidden;
    background: #0f7a1e;
    box-shadow: inset 0 0 0 3px #041c07, inset 0 0 22px 6px rgba(0,0,0,0.6);
  }

  #mapLayer {
    position: absolute;
    inset: -6%;
    width: 112%;
    height: 112%;
    filter: grayscale(1) sepia(1) hue-rotate(68deg) saturate(8) brightness(0.85) contrast(1.4);
  }
  .leaflet-container { background: #0f7a1e; }
  .leaflet-tile { filter: blur(0.3px); }

  .scanlines {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg, rgba(0,0,0,0.16) 0px, rgba(0,0,0,0.16) 1px, transparent 1px, transparent 3px);
    mix-blend-mode: multiply;
    opacity: 0.55;
  }

  .radar-screen svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .blip {
    animation: blip-pulse 1.8s ease-in-out infinite;
    transform-box: fill-box;
    transform-origin: center;
  }
  @keyframes blip-pulse {
    0%, 100% { opacity: 0.75; transform: scale(0.9); }
    50%      { opacity: 1; transform: scale(1.15); }
  }

  #pointer {
    transform-origin: 100px 100px;
    transform: rotate(var(--angle, 0deg));
    filter: drop-shadow(0 0 5px rgba(255,40,40,0.85));
    animation: pointer-pulse 2.4s ease-in-out infinite;
    transition: transform 0.6s linear;
  }
  @keyframes pointer-pulse {
    0%, 100% { filter: drop-shadow(0 0 3px rgba(255,40,40,0.6)); }
    50%      { filter: drop-shadow(0 0 9px rgba(255,40,40,1)); }
  }

  .ping {
    transform-origin: 100px 100px;
    animation: ping-grow 3.2s ease-out infinite;
  }
  @keyframes ping-grow {
    0%   { r: 4; opacity: 0.9; }
    100% { r: 90; opacity: 0; }
  }

  .screen-glare {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.20) 0%, transparent 28%, transparent 72%, rgba(255,255,255,0.05) 100%);
    pointer-events: none;
  }

  .readout {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-family: ui-monospace, 'Consolas', 'Courier New', monospace;
    font-weight: 700;
    color: #d9ff70;
    text-shadow:
      1px 1px 0 #052506, -1px 1px 0 #052506,
      1px -1px 0 #052506, -1px -1px 0 #052506,
      0 0 6px rgba(217,255,112,0.65);
    pointer-events: none;
    z-index: 6;
  }
  #kmText {
    top: 40px;
    font-size: 22px;
    letter-spacing: 1px;
  }
  #gpsStatus {
    top: 68px;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: #ffd98a;
    text-shadow: 1px 1px 0 #3a1c00, -1px 1px 0 #3a1c00, 1px -1px 0 #3a1c00, -1px -1px 0 #3a1c00;
  }
  #dateText {
    bottom: 46px;
    font-size: 13px;
    letter-spacing: 2px;
  }
  #timeText {
    bottom: 30px;
    font-size: 13px;
    letter-spacing: 2px;
  }

  /* --- Panel edycji (tylko z ?edit=1) --- */
  .edit-panel {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 10px;
    background: rgba(0,0,0,0.75);
    border-radius: 8px;
    padding: 8px 12px;
    color: #fff;
    font: 12px ui-monospace, 'Consolas', monospace;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    flex-wrap: wrap;
    width: 260px;
  }
  .edit-panel.show { display: flex; }
  .edit-panel input {
    width: 70px;
    padding: 3px 6px;
    border-radius: 5px;
    border: none;
    font: inherit;
  }
  .edit-panel button {
    padding: 4px 10px;
    border-radius: 5px;
    border: none;
    background: #ffcf40;
    color: #3a2200;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

  <div class="radar-unit">

    <div class="radar-casing">
      <div class="radar-bezel"></div>
      <div class="radar-screen">
        <div id="mapLayer"></div>

        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="grid" width="16.6" height="16.6" patternUnits="userSpaceOnUse">
              <path d="M16.6 0H0V16.6" fill="none" stroke="#0a4d18" stroke-width="0.9" opacity="0.8"/>
            </pattern>
            <radialGradient id="vignette" cx="50%" cy="46%" r="60%">
              <stop offset="60%" stop-color="#000" stop-opacity="0"/>
              <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
            </radialGradient>
            <clipPath id="screenClip">
              <circle cx="100" cy="100" r="98"/>
            </clipPath>
          </defs>

          <g clip-path="url(#screenClip)">
            <rect x="0" y="0" width="200" height="200" fill="#0f7a1e" opacity="0.35"/>
            <rect x="0" y="0" width="200" height="200" fill="url(#grid)"/>
            <circle cx="100" cy="100" r="49.5" fill="none" stroke="#062e0c" stroke-width="1.1" opacity="0.75"/>
            <circle cx="100" cy="100" r="99"  fill="none" stroke="#062e0c" stroke-width="1.1" opacity="0.75"/>

            <!-- pomaranczowe kropki (wykryte smocze kule) -->
            <g>
              <circle class="blip" cx="66" cy="70" r="6.5" fill="#ffb400" stroke="#7a4600" stroke-width="1.4"/>
              <circle class="blip" cx="128" cy="52" r="5.5" fill="#ffb400" stroke="#7a4600" stroke-width="1.4" style="animation-delay:.5s"/>
              <circle class="blip" cx="140" cy="132" r="6" fill="#ffb400" stroke="#7a4600" stroke-width="1.4" style="animation-delay:1s"/>
            </g>

            <!-- czerwony trojkat - kierunek najblizszej kuli -->
            <g id="pointer">
              <polygon points="100,100 78,150 128,140" fill="#ff2b2b" stroke="#4a0000" stroke-width="2" stroke-linejoin="round"/>
            </g>

            <rect x="0" y="0" width="200" height="200" fill="url(#vignette)"/>
          </g>

          <!-- czarny okrag na krawedzi ekranu -->
          <circle cx="100" cy="100" r="98" fill="none" stroke="#041c07" stroke-width="2.5"/>
        </svg>

        <div class="scanlines"></div>
        <div class="screen-glare"></div>
        <div class="readout" id="kmText">0.0 KM</div>
        <div class="readout" id="gpsStatus">SZUKAM GPS...</div>
        <div class="readout" id="dateText">--- ---</div>
        <div class="readout" id="timeText">--:--</div>
      </div>
    </div>

    <div class="edit-panel" id="editPanel">
      <label>Dystans (km):</label>
      <input type="number" id="editInput" min="0" step="0.1">
      <button id="editSave">Zapisz</button>
      <button id="editReset" title="Wyzeruj licznik dystansu">Zeruj</button>
      <span id="editStatus"></span>
    </div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  /* ============================================================
     RADAR_CONFIG
  ============================================================ */
  const RADAR_CONFIG = {
    startLat: 50.0647,   // domyslny srodek mapy, zanim GPS zlapie pozycje (Krakow)
    startLng: 19.9450,
    zoom: 16,
    distanceKm: 0,       // wartosc startowa licznika, jesli nic nie jest zapisane
    kmStorageKey: 'dragon_radar_km',
    accuracyLimitM: 50,  // ignoruj pomiary GPS o dokladnosci gorszej niz X metrow
    minStepM: 6,         // ignoruj mikro-drgania GPS mniejsze niz X metrow
    maxStepM: 400         // ignoruj nagle "skoki" GPS wieksze niz X metrow (blad odczytu)
  };

  const params = new URLSearchParams(location.search);

  // --- Mapa (Leaflet + OpenStreetMap) ---
  let mapView = null;
  let userMarker = null;
  try {
    const forcedLat = parseFloat(params.get('lat'));
    const forcedLng = parseFloat(params.get('lng'));
    const initLat = !isNaN(forcedLat) ? forcedLat : RADAR_CONFIG.startLat;
    const initLng = !isNaN(forcedLng) ? forcedLng : RADAR_CONFIG.startLng;

    mapView = L.map('mapLayer', {
      center: [initLat, initLng],
      zoom: RADAR_CONFIG.zoom,
      zoomControl: false,
      attributionControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false,
      touchZoom: false,
      fadeAnimation: false
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
      maxZoom: 20,
      subdomains: 'abcd'
    }).addTo(mapView);
  } catch (e) {
    console.warn('Mapa niedostepna (brak internetu?)', e);
  }

  // --- Licznik dystansu w km ---
  function readKm() {
    if (params.has('km')) {
      const v = parseFloat(params.get('km'));
      if (!isNaN(v)) { localStorage.setItem(RADAR_CONFIG.kmStorageKey, String(v)); return v; }
    }
    if (params.get('resetkm') === '1') {
      localStorage.setItem(RADAR_CONFIG.kmStorageKey, '0');
      return 0;
    }
    const stored = localStorage.getItem(RADAR_CONFIG.kmStorageKey);
    return stored !== null ? parseFloat(stored) : RADAR_CONFIG.distanceKm;
  }

  let totalKm = readKm();
  function renderKm() {
    document.getElementById('kmText').textContent = totalKm.toFixed(1) + ' KM';
  }
  renderKm();

  function haversineMeters(a, b) {
    const R = 6371000;
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLng = (b.lng - a.lng) * Math.PI / 180;
    const la1 = a.lat * Math.PI / 180, la2 = b.lat * Math.PI / 180;
    const h = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(h));
  }

  // --- GPS na zywo (Geolocation API przegladarki) ---
  let lastFix = null;
  function setStatus(text) {
    document.getElementById('gpsStatus').textContent = text;
  }

  function handlePosition(pos) {
    const { latitude: lat, longitude: lng, accuracy, heading } = pos.coords;
    setStatus('GPS OK · ±' + Math.round(accuracy) + 'm');

    if (mapView) mapView.setView([lat, lng], mapView.getZoom());

    if (lastFix && accuracy <= RADAR_CONFIG.accuracyLimitM) {
      const stepM = haversineMeters(lastFix, { lat, lng });
      if (stepM >= RADAR_CONFIG.minStepM && stepM <= RADAR_CONFIG.maxStepM) {
        totalKm += stepM / 1000;
        localStorage.setItem(RADAR_CONFIG.kmStorageKey, String(totalKm));
        renderKm();
      }
    }
    lastFix = { lat, lng };

    if (typeof heading === 'number' && !isNaN(heading)) {
      document.documentElement.style.setProperty('--angle', heading + 'deg');
    }
  }

  function handleError(err) {
    if (err.code === 1) setStatus('BRAK ZGODY NA GPS');
    else if (err.code === 2) setStatus('BRAK SYGNAŁU GPS');
    else setStatus('OCZEKIWANIE NA GPS...');
  }

  if (params.has('lat') && params.has('lng')) {
    setStatus('TRYB RĘCZNY (URL)');
  } else if (navigator.geolocation) {
    navigator.geolocation.watchPosition(handlePosition, handleError, {
      enableHighAccuracy: true,
      maximumAge: 5000,
      timeout: 15000
    });
  } else {
    setStatus('GPS NIEDOSTĘPNE');
  }

  // --- Kompas (kierunek urzadzenia), jesli GPS nie daje heading ---
  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientationabsolute', (e) => {
      if (typeof e.alpha === 'number') {
        document.documentElement.style.setProperty('--angle', (360 - e.alpha) + 'deg');
      }
    }, true);
  }

  // --- Data i godzina (zegar urzadzenia) ---
  const MONTHS = ['STY','LUT','MAR','KWI','MAJ','CZE','LIP','SIE','WRZ','PAŹ','LIS','GRU'];
  function renderClock() {
    const now = new Date();
    document.getElementById('dateText').textContent =
      String(now.getDate()).padStart(2, '0') + ' ' + MONTHS[now.getMonth()];
    document.getElementById('timeText').textContent =
      String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  }
  renderClock();
  setInterval(renderClock, 15000);

  // --- Tryb edycji: ?edit=1 -> reczne ustawienie / zerowanie dystansu ---
  if (params.get('edit') === '1') {
    const panel = document.getElementById('editPanel');
    panel.classList.add('show');
    const input = document.getElementById('editInput');
    input.value = totalKm;
    document.getElementById('editSave').addEventListener('click', () => {
      const v = parseFloat(input.value);
      if (!isNaN(v)) {
        totalKm = v;
        localStorage.setItem(RADAR_CONFIG.kmStorageKey, String(v));
        renderKm();
        document.getElementById('editStatus').textContent = 'Zapisano ✓';
        setTimeout(() => document.getElementById('editStatus').textContent = '', 1500);
      }
    });
    document.getElementById('editReset').addEventListener('click', () => {
      totalKm = 0;
      localStorage.setItem(RADAR_CONFIG.kmStorageKey, '0');
      input.value = 0;
      renderKm();
    });
  }
</script>
</body>
</html>
